spack:
  specs:
  # macOS (Apple Silicon M4 Pro) — serial Kokkos + MPI for multi-core parallelism
  # Apple Clang lacks OpenMP; Trilinos lacks Threads ETI support.
  # Use `mpirun -np N ./ns_solver` for parallel runs on all 14 cores.
  - openmpi

  # Serial Kokkos — MPI handles parallelism on this machine
  - kokkos ~openmp +serial ~threads ~cuda

  # Serial Kokkos Kernels
  - kokkos-kernels ~openmp +blas +lapack +execspace_serial +serial ~cuda

  # Trilinos with serial Kokkos + MPI (16.0.0 fixes kokkos-kernels spadd_handle bug)
  - trilinos@16.0.0 +kokkos +tpetra +belos +muelu +ifpack2 +mpi ~openmp +amesos2 +zoltan2 ~aztec ~epetra ~cuda

  - superlu-dist ~openmp +parmetis
  - parmetis +shared
  - cmake
  - ninja
  - doxygen

  packages:
    all:
      # Apple Clang for everything — no OpenMP, no Fortran headaches for most packages
      require: '%apple-clang@17.0.0'

    # Packages that need Fortran get GCC for that language only (Spack handles the split)
    superlu-dist:
      require: '%apple-clang@17.0.0 %fortran=gcc@15.2.0'
    trilinos:
      require: '%apple-clang@17.0.0 %fortran=gcc@15.2.0'
    openmpi:
      require: '%apple-clang@17.0.0 %fortran=gcc@15.2.0'
    openblas:
      require: '%apple-clang@17.0.0 %fortran=gcc@15.2.0'
